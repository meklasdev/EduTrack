<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiadomość od nauczyciela</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: rgba(10, 12, 16, 0.95);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            border: 2px solid #f85149;
            border-radius: 16px;
            text-align: center;
            padding: 28px;
            overflow: hidden;
            user-select: none;
        }
        .icon { font-size: 2.5rem; margin-bottom: 12px; }
        h2 {
            color: #f85149;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        #msg {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e6edf3;
            margin-bottom: 24px;
            max-width: 420px;
        }
        button {
            background: #f85149;
            color: #fff;
            border: none;
            padding: 10px 32px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            font-family: inherit;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background 0.2s, transform 0.15s;
        }
        button:hover { background: #da3633; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="icon">📣</div>
    <h2>Wiadomość od nauczyciela</h2>
    <p id="msg">Oczekiwanie na treść...</p>
    <button id="close-btn">Zamknij</button>

    <script>
        const api = window.electronAPI;
        if (api) {
            api.onSetMsg((m) => { document.getElementById('msg').innerText = m; });
            document.getElementById('close-btn').addEventListener('click', () => api.hideMsg());
        }
    </script>
</body>
</html>
