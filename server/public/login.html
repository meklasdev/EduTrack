<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack Pro — Logowanie</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #6264a7;
            --purple-light: #8b8dc7;
            --bg: #0f0f1a;
            --card: rgba(22, 22, 40, 0.85);
            --border: rgba(98,100,167,0.3);
            --text: #e8e8f0;
            --muted: #7b7b9d;
            --danger: #e05a6a;
            --success: #4ec994;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* Animated mesh background */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(98,100,167,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(98,100,167,0.12) 0%, transparent 60%);
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(98,100,167,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(98,100,167,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(98,100,167,0.12); top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: rgba(139,141,199,0.08); bottom: -80px; right: -80px; animation-delay: -4s; }
        @keyframes float {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(30px, 20px); }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 44px 40px 36px;
            backdrop-filter: blur(20px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(98,100,167,0.1) inset;
            animation: fadeUp 0.5s ease-out;
        }
        @keyframes fadeUp {
            from { opacity:0; transform: translateY(24px); }
            to   { opacity:1; transform: translateY(0); }
        }

        /* Logo */
        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800;
            box-shadow: 0 4px 16px rgba(98,100,167,0.4);
        }
        .logo-text { font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; }
        .logo-text span { color: var(--purple-light); }
        .logo-version {
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .tab-btn {
            flex: 1; padding: 8px; border: none; background: transparent;
            color: var(--muted); cursor: pointer; border-radius: 6px;
            font-size: 0.85rem; font-weight: 600; font-family: inherit;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--purple);
            color: #fff;
            box-shadow: 0 2px 8px rgba(98,100,167,0.4);
        }

        /* Forms */
        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.08);
            border-bottom: 2px solid rgba(98,100,167,0.3);
            color: var(--text);
            padding: 11px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus {
            border-bottom-color: var(--purple);
            box-shadow: 0 4px 12px rgba(98,100,167,0.15);
        }

        .btn-primary {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            border: none; border-radius: 8px;
            color: #fff; font-family: inherit;
            font-weight: 700; font-size: 0.95rem;
            cursor: pointer; margin-top: 6px;
            letter-spacing: 0.5px;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 4px 18px rgba(98,100,167,0.35);
            position: relative; overflow: hidden;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(98,100,167,0.45); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary.loading { opacity: 0.7; pointer-events: none; }
        .btn-primary .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        .btn-primary.loading .btn-label { display: none; }
        .btn-primary.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .msg {
            margin-top: 14px; font-size: 0.82rem;
            text-align: center; padding: 10px;
            border-radius: 6px; display: none;
        }
        .msg.error { background: rgba(224,90,106,0.12); color: var(--danger); border: 1px solid rgba(224,90,106,0.2); display: block; }
        .msg.success { background: rgba(78,201,148,0.12); color: var(--success); border: 1px solid rgba(78,201,148,0.2); display: block; }

        .divider {
            text-align: center;
            color: var(--muted);
            font-size: 0.75rem;
            margin: 10px 0;
        }
        .footer-note {
            margin-top: 24px;
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <div class="logo-row">
            <div class="logo-icon">ET</div>
            <div class="logo-text">Edu<span>Track</span></div>
        </div>
        <div class="logo-version">Pro v1.2 &nbsp;·&nbsp; Classroom Intelligence</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Zaloguj się</button>
            <button class="tab-btn" onclick="switchTab('register')">Zarejestruj</button>
        </div>

        <!-- Login Form -->
        <div id="panel-login" class="form-panel active">
            <form id="login-form" autocomplete="on">
                <div class="field">
                    <label>Nazwa użytkownika</label>
                    <input type="text" id="login-username" autocomplete="username" placeholder="nauczyciel@szkoła" required>
                </div>
                <div class="field">
                    <label>Hasło</label>
                    <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" id="login-btn">
                    <span class="btn-label">Zaloguj się</span>
                    <span class="spinner"></span>
                </button>
                <div id="login-msg" class="msg"></div>
            </form>
        </div>

        <!-- Register Form -->
        <div id="panel-register" class="form-panel">
            <form id="register-form" autocomplete="off">
                <div class="field">
                    <label>Nazwa użytkownika</label>
                    <input type="text" id="reg-username" placeholder="jan.kowalski" required>
                </div>
                <div class="field">
                    <label>Dział / Przedmiot</label>
                    <input type="text" id="reg-dept" placeholder="np. Informatyka" required>
                </div>
                <div class="field">
                    <label>Hasło</label>
                    <input type="password" id="reg-password" placeholder="Minimum 6 znaków" required minlength="6">
                </div>
                <button type="submit" class="btn-primary" id="reg-btn">
                    <span class="btn-label">Utwórz konto</span>
                    <span class="spinner"></span>
                </button>
                <div id="reg-msg" class="msg"></div>
            </form>
        </div>

        <div class="footer-note">
            EduTrack Pro &copy; 2025 &nbsp;·&nbsp; Dedykowane dla szkół technicznych
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1)));
            document.getElementById('panel-login').classList.toggle('active', tab === 'login');
            document.getElementById('panel-register').classList.toggle('active', tab === 'register');
        }

        function setLoading(btnId, loading) {
            document.getElementById(btnId).classList.toggle('loading', loading);
        }
        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.className = 'msg ' + type;
            el.innerText = text;
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            setLoading('login-btn', true);
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('edutrack_token', data.token);
                    localStorage.setItem('edutrack_user', JSON.stringify(data.teacher));
                    showMsg('login-msg', 'Zalogowano pomyślnie! Przekierowuję...', 'success');
                    setTimeout(() => window.location.href = '/admin', 800);
                } else {
                    showMsg('login-msg', data.error || 'Nieprawidłowe dane logowania.', 'error');
                    setLoading('login-btn', false);
                }
            } catch {
                showMsg('login-msg', 'Błąd połączenia z serwerem.', 'error');
                setLoading('login-btn', false);
            }
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            setLoading('reg-btn', true);
            const username = document.getElementById('reg-username').value.trim();
            const departmentName = document.getElementById('reg-dept').value.trim();
            const password = document.getElementById('reg-password').value;
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, departmentName })
                });
                const data = await res.json();
                if (res.ok) {
                    showMsg('reg-msg', 'Konto utworzone! Możesz się teraz zalogować.', 'success');
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    showMsg('reg-msg', data.error || 'Błąd rejestracji.', 'error');
                }
            } catch {
                showMsg('reg-msg', 'Błąd połączenia z serwerem.', 'error');
            }
            setLoading('reg-btn', false);
        };
    </script>
</body>
</html>
